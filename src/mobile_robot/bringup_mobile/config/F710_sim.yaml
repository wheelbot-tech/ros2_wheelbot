teleop_twist_joy_node:
  ros__parameters:
    axis_linear:  # Left thumb stick vertical
      x: 1
      y: 0
    scale_linear:
      x: 0.2
      y: 0.2
    scale_linear_turbo:
      x: 1.0
      y: 1.0

    axis_angular:  # Right thumb stick horizontal
      yaw: 3
    scale_angular:
      yaw: 0.25

    enable_button: 4  # LB
    enable_turbo_button: 2 
    offset: 0.5