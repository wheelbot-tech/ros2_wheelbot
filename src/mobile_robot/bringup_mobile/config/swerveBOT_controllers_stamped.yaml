#/*:                                # ATENTIE ! se inlatura commentul in cazul utilizarii NAMESPCE-ului
  controller_manager:
    ros__parameters:
      update_rate: 30  # Hz

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      swerve_controller:
        type: swerve_controller/SwerveController
      
      FL_drive_controller:
        type: diff_drive_controller/DiffDriveController
      
      FR_drive_controller:
        type: diff_drive_controller/DiffDriveController
      
      RL_drive_controller:
        type: diff_drive_controller/DiffDriveController
      
      RR_drive_controller:
        type: diff_drive_controller/DiffDriveController

  swerve_controller:
    ros__parameters:
      #Used to scale velocity
      chassis_length_meters: 0.934
      chassis_width_meters: 0.630
      wheel_radius_meters: 0.0825
      max_wheel_angular_velocity: 100.0
      y_axis_direction: -1.0     # -1 for Isaac Sim
      yaw_axis_direction: 1.0   
      #If no new twist commands are created in 1 second the robot will halt 
      cmd_vel_timeout_seconds: 1.0
      use_stamped_vel: true
      front_left_wheel_joint: virtual_front_left_wheel_joint
      front_right_wheel_joint: virtual_front_right_wheel_joint
      rear_left_wheel_joint: virtual_rear_left_wheel_joint
      rear_right_wheel_joint: virtual_rear_right_wheel_joint
      front_left_axle_joint: virtual_front_left_steering_joint
      front_right_axle_joint: virtual_front_right_steering_joint
      rear_left_axle_joint: virtual_rear_left_steering_joint
      rear_right_axle_joint: virtual_rear_right_steering_joint
      
      linear.x.has_velocity_limits: false
      linear.x.has_acceleration_limits: true
      linear.x.has_jerk_limits: false
      linear.x.max_velocity: 2.0
      linear.x.min_velocity: -2.0
      linear.x.max_acceleration: 3.0
      linear.x.min_acceleration: -3.0
      linear.x.max_jerk: 5.0
      linear.x.min_jerk: -5.0

      linear.y.has_velocity_limits: false
      linear.y.has_acceleration_limits: true
      linear.y.has_jerk_limits: false
      linear.y.max_velocity: 2.0
      linear.y.min_velocity: -2.0
      linear.y.max_acceleration: 3.0
      linear.y.min_acceleration: -3.0
      linear.y.max_jerk: 5.0
      linear.y.min_jerk: -5.0
      
      angular.z.has_velocity_limits: false
      angular.z.has_acceleration_limits: true
      angular.z.has_jerk_limits: false
      angular.z.max_velocity: 3.0
      angular.z.min_velocity: -3.0
      angular.z.max_acceleration: 3.0
      angular.z.min_acceleration: -3.0
      angular.z.max_jerk: 5.0
      angular.z.min_jerk: -5.0

  FL_drive_controller:
    ros__parameters:
          left_wheel_names: ["FL_drive_left_joint"]
          right_wheel_names: ["FL_drive_right_joint"]

          wheel_separation: 0.23
          wheels_per_side: 1  
          wheel_radius: 0.0825

          wheel_separation_multiplier: 1.0
          left_wheel_radius_multiplier: 1.0
          right_wheel_radius_multiplier: 1.0

          publish_rate: 30.0
          odom_frame_id: odom
          enable_odom_tf: false
          base_frame_id: base_link
          pose_covariance_diagonal : [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]
          twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]

          cmd_vel_timeout: 0.5  # default 0.5
          use_stamped_vel: true

          linear.x.has_velocity_limits: true
          linear.x.has_acceleration_limits: true
          linear.x.has_jerk_limits: false
          linear.x.max_velocity: 1.0
          linear.x.min_velocity: -1.0
          linear.x.max_acceleration: 3.0        # m/s^2
          linear.x.max_jerk: 0.0
          linear.x.min_jerk: 0.0

          angular.z.has_velocity_limits: true
          angular.z.has_acceleration_limits: true
          angular.z.has_jerk_limits: false
          angular.z.max_velocity: 1.0
          angular.z.min_velocity: -1.0
          angular.z.max_acceleration: 6.0        # rad/s^2 
          angular.z.min_acceleration: -6.0
          angular.z.max_jerk: 0.0
          angular.z.min_jerk: 0.0

  FR_drive_controller:
