controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    bicycle_steering_controller:
      type: bicycle_steering_controller/BicycleSteeringController
    
    front_center_drive_controller:
      type: diff_drive_controller/DiffDriveController

bicycle_steering_controller:
  ros__parameters:
    wheelbase: 0.445
    front_wheel_radius: 0.0825
    rear_wheel_radius: 0.0825
    front_steering: true
    reference_timeout: 2.0
    rear_wheels_names: ['virtual_traction_wheel_joint']
    front_wheels_names: ['virtual_steering_wheel_joint']
    open_loop: false
    velocity_rolling_window_size: 10
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true
    twist_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
    pose_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
    position_feedback: false
    use_stamped_vel: true

front_center_drive_controller:
  ros__parameters:
    left_wheel_names: ["FC_drive_left_joint"]
    right_wheel_names: ["FC_drive_right_joint"]

    wheel_separation: 0.23
    wheels_per_side: 1  
    wheel_radius: 0.0825

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 50.0
    odom_frame_id: odom
    enable_odom_tf: false
    base_frame_id: base_link
    pose_covariance_diagonal : [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]

    cmd_vel_timeout: 0.25  # default 0.5
    use_stamped_vel: true

    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 1.0
    linear.x.min_velocity: -1.0
    linear.x.max_acceleration: 3.0        # m/s^2
    linear.x.max_jerk: 0.0
    linear.x.min_jerk: 0.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0
    angular.z.max_acceleration: 6.0        # rad/s^2 
    angular.z.min_acceleration: -6.0
    angular.z.max_jerk: 0.0
    angular.z.min_jerk: 0.0