controller_manager:
  ros__parameters:
    update_rate: 30

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    swerve_controller:
      type: swerve_drive_controller/SwerveController

swerve_controller:
  ros__parameters:
    wheelbase: 0.43
    trackwidth: 0.43
    offset: [0.0, 0.0]
    center_of_rotation: [0.0, 0.0]
    wheel_radius: 0.0825

    cmd_vel_timeout: 5.0
    use_stamped_vel: true

    front_left_wheel_joint: virtual_front_left_wheel_joint
    front_right_wheel_joint: virtual_front_right_wheel_joint
    rear_left_wheel_joint: virtual_rear_left_wheel_joint
    rear_right_wheel_joint: virtual_rear_right_wheel_joint

    front_left_axle_joint: virtual_front_left_steering_joint
    front_right_axle_joint: virtual_front_right_steering_joint
    rear_left_axle_joint: virtual_rear_left_steering_joint
    rear_right_axle_joint: virtual_rear_right_steering_joint

    front_left_velocity_threshold: 1.0
    front_right_velocity_threshold: 1.0
    rear_left_velocity_threshold: 1.0
    rear_right_velocity_threshold: 1.0

    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    odom: odom
    base_footprint: base_footprint
    enable_odom_tf: false
    open_loop: false
    # Fallback for direct controller use; serial launch derives this from active_modules.
    active_wheels: [front_right, rear_left]
    use_common_speed_scale: true
    steering_speed_scale_start_angle: 0.17453292519943295  # 10 degrees
